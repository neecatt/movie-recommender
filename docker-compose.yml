version: "3.9"
services:
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-http://mlflow:5000}
    depends_on:
      - mlflow

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlflow/mlruns
      --artifacts-destination /mlflow/artifacts
    volumes:
      - ./mlflow:/mlflow
